<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F5EFE3" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MoneyMind" />
  <title>MoneyMind — AI Financial Co-pilot</title>

  <!-- Favicon set (logo v2 — cream/gold blocks) -->
  <link rel="icon" href="/ui/assets/logo_icon/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/ui/assets/logo_icon/moneymind-icon.svg" />
  <link rel="icon" type="image/png" sizes="16x16" href="/ui/assets/logo_icon/moneymind-icon-16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/ui/assets/logo_icon/moneymind-icon-32.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="/ui/assets/logo_icon/moneymind-icon-96.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/ui/assets/logo_icon/moneymind-icon-180.png" />
  <link rel="manifest" href="/ui/manifest.webmanifest" />

  <!-- Styling lives in the ux_ui/ folder, mounted at /ui by Flask -->
  <link rel="stylesheet" href="/ui/styles.css" />
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <!-- frontend/  — app data + state + pages -->
  <script src="/fe/src/data.js"></script>

  <!-- ux_ui/  — primitives, icons, theme tweaks (must load before views/app use them) -->
  <script type="text/babel" src="/ui/src/tweaks-panel.jsx"></script>
  <script type="text/babel" src="/ui/src/ui.jsx"></script>

  <!-- frontend/  — views, auth, app shell -->
  <script type="text/babel" src="/fe/src/views.jsx"></script>
  <script type="text/babel" src="/fe/src/auth.jsx"></script>
  <script type="text/babel" src="/fe/src/app.jsx"></script>
</body>
</html>
