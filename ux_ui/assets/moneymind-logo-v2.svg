<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- MoneyMind v2 — blocks with full gold outline -->

  <!-- Cream rounded frame -->
  <rect x="56" y="56" width="400" height="400" rx="72" ry="72"
        fill="#F5EFE3"/>

  <rect x="76" y="76" width="360" height="360" rx="60" ry="60"
        fill="none" stroke="#14141A" stroke-width="6"/>

  <rect x="92" y="92" width="328" height="328" rx="48" ry="48"
        fill="none" stroke="#D4B978" stroke-width="2"/>

  <g transform="translate(256 280)">

    <!-- LEFT block — black fill + gold stroke all around -->
    <g transform="translate(-68 -36) skewX(-18)">
      <rect x="-26" y="-78" width="52" height="156" rx="14" ry="14"
            fill="#14141A"
            stroke="#D4B978" stroke-width="3"/>
    </g>

    <!-- MIDDLE block -->
    <g transform="translate(-10 0) skewX(-18)">
      <rect x="-26" y="-50" width="52" height="124" rx="14" ry="14"
            fill="#14141A"
            stroke="#D4B978" stroke-width="3"/>
    </g>

    <!-- RIGHT block -->
    <g transform="translate(68 -36) skewX(-18)">
      <rect x="-26" y="-78" width="52" height="156" rx="14" ry="14"
            fill="#14141A"
            stroke="#D4B978" stroke-width="3"/>
    </g>

  </g>

</svg>
