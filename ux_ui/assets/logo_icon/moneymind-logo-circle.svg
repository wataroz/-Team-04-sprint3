<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- MoneyMind — Circular profile version -->

  <!-- Cream circle background -->
  <circle cx="256" cy="256" r="240" fill="#F5EFE3"/>

  <!-- Black outer ring -->
  <circle cx="256" cy="256" r="228" fill="none" stroke="#14141A" stroke-width="6"/>

  <!-- Inner gold hairline ring -->
  <circle cx="256" cy="256" r="212" fill="none" stroke="#D4B978" stroke-width="2"/>

  <!-- 3-block M (same geometry, centered) -->
  <g transform="translate(256 280)">

    <!-- LEFT block — gold outline -->
    <g transform="translate(-68 -36) skewX(-18)">
      <rect x="-26" y="-78" width="52" height="156" rx="14" ry="14"
            fill="#14141A"
            stroke="#D4B978" stroke-width="3"/>
    </g>

    <!-- MIDDLE block -->
    <g transform="translate(-10 0) skewX(-18)">
      <rect x="-26" y="-50" width="52" height="124" rx="14" ry="14"
            fill="#14141A"
            stroke="#D4B978" stroke-width="3"/>
    </g>

    <!-- RIGHT block -->
    <g transform="translate(68 -36) skewX(-18)">
      <rect x="-26" y="-78" width="52" height="156" rx="14" ry="14"
            fill="#14141A"
            stroke="#D4B978" stroke-width="3"/>
    </g>

  </g>

</svg>
